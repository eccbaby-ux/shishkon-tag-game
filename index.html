<!DOCTYPE html>
<html>
<head>
    <title>מבוך תופסת</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; color: white; font-family: sans-serif; }
        canvas {
            display: block;
            background: #333;
            touch-action: none;
        }
        #ui { position: absolute; top: 10; left: 10; pointer-events: none; }
        #joystick-root {
            position: fixed;
            left: 50%;
            bottom: max(16px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            z-index: 20;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        .joystick-base {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.14);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.25);
            touch-action: none;
            cursor: grab;
        }
        .joystick-base:active {
            cursor: grabbing;
        }
        .joystick-knob {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 52px;
            height: 52px;
            margin-left: -26px;
            margin-top: -26px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.32);
            transform: translate(0px, 0px);
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        #dashBtn {
            position: fixed;
            right: max(16px, env(safe-area-inset-right));
            bottom: max(100px, calc(16px + env(safe-area-inset-bottom)));
            z-index: 21;
            width: 72px;
            height: 72px;
            padding: 0;
            border: none;
            border-radius: 50%;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            background: rgba(100, 180, 255, 0.55);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
            transition: opacity 0.15s, background 0.15s;
        }
        #dashBtn.dash-cooldown {
            opacity: 0.42;
            background: rgba(80, 80, 90, 0.75);
            cursor: default;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="timer">1:00</h1>
        <p id="status">חפש מישהו לתפוס!</p>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="joystick-root" aria-hidden="true">
        <div class="joystick-base" id="joystickBase">
            <div class="joystick-knob" id="joystickKnob"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('timer');
        const dashBtn = document.getElementById('dashBtn');

        const MAZE_BG = '#333';
        const WALL_COLOR = '#252525';
        const PLAYER_W = 30;
        const PLAYER_H = 30;
        const BASE_MOVE_STEP = 6;
        const TAGGER_SPEED_MULT = 1.1;
        const DASH_DURATION_MS = 200;
        const DASH_COOLDOWN_MS = 5000;
        const DASH_SPEED_MULT = 4;

        let dashUntil = 0;
        let dashCooldownUntil = 0;
        let lastMoveDirX = 0;
        let lastMoveDirY = 0;

        function tryActivateDash() {
            const now = performance.now();
            if (now < dashCooldownUntil) return;
            dashUntil = now + DASH_DURATION_MS;
            dashCooldownUntil = now + DASH_COOLDOWN_MS;
        }

        function updateDashButtonVisual() {
            const now = performance.now();
            const onCooldown = now < dashCooldownUntil;
            dashBtn.classList.toggle('dash-cooldown', onCooldown);
            if (onCooldown) {
                const sec = Math.max(1, Math.ceil((dashCooldownUntil - now) / 1000));
                dashBtn.textContent = String(sec);
            } else {
                dashBtn.textContent = 'Dash';
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code !== 'Space' && e.key !== ' ') return;
            if (e.repeat) return;
            e.preventDefault();
            tryActivateDash();
        });

        function onDashButtonPress(e) {
            e.preventDefault();
            tryActivateDash();
        }
        dashBtn.addEventListener('touchstart', onDashButtonPress, { passive: false });
        dashBtn.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'touch') return;
            e.preventDefault();
            tryActivateDash();
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let players = {};
        let maze = null;
        let cellSize = 52;
        const camera = { x: 0, y: 0 };
        const renderPosition = {};
        let lastInterpTime = performance.now();
        const INTERP_SMOOTH_HZ = 14;
        const INTERP_SNAP_PX = 150;
        const INTERP_SNAP_EPS = 0.2;

        function pruneRenderPosition() {
            for (const id in renderPosition) {
                if (!players[id]) delete renderPosition[id];
            }
        }

        function stepRenderPositionInterpolation() {
            const now = performance.now();
            const dt = Math.min((now - lastInterpTime) / 1000, 0.1);
            lastInterpTime = now;
            const k = 1 - Math.exp(-INTERP_SMOOTH_HZ * dt);

            for (const id in players) {
                if (id === socket.id) continue;
                const p = players[id];
                let r = renderPosition[id];
                if (!r) {
                    renderPosition[id] = { x: p.x, y: p.y };
                    continue;
                }
                const dx = p.x - r.x;
                const dy = p.y - r.y;
                const dist = Math.hypot(dx, dy);
                if (dist > INTERP_SNAP_PX) {
                    r.x = p.x;
                    r.y = p.y;
                    continue;
                }
                r.x += dx * k;
                r.y += dy * k;
                if (Math.hypot(p.x - r.x, p.y - r.y) < INTERP_SNAP_EPS) {
                    r.x = p.x;
                    r.y = p.y;
                }
            }
        }

        function getDrawPositionForPlayer(id, p) {
            if (id === socket.id) return { x: p.x, y: p.y };
            const r = renderPosition[id];
            return r ? { x: r.x, y: r.y } : { x: p.x, y: p.y };
        }

        socket.on('mazeData', (data) => {
            maze = data.maze;
            cellSize = data.cellSize;
            for (const id in renderPosition) delete renderPosition[id];
        });

        function playerOverlapsWall(x, y, w, h) {
            if (!maze || !maze.length || !maze[0].length) return false;
            const rows = maze.length;
            const cols = maze[0].length;
            const c0 = Math.floor(x / cellSize);
            const c1 = Math.floor((x + w - 1) / cellSize);
            const r0 = Math.floor(y / cellSize);
            const r1 = Math.floor((y + h - 1) / cellSize);
            for (let r = r0; r <= r1; r++) {
                for (let c = c0; c <= c1; c++) {
                    if (r < 0 || r >= rows || c < 0 || c >= cols || maze[r][c] === 1) {
                        return true;
                    }
                }
            }
            return false;
        }
        socket.on('positionCorrection', (pos) => {
            if (players[socket.id]) {
                players[socket.id].x = pos.x;
                players[socket.id].y = pos.y;
            }
        });
        socket.on('currentPlayers', (serverPlayers) => {
            players = serverPlayers;
            pruneRenderPosition();
            for (const id in players) {
                if (id === socket.id) continue;
                const p = players[id];
                if (!renderPosition[id]) renderPosition[id] = { x: p.x, y: p.y };
            }
        });
        socket.on('gameReset', (data) => {
            maze = data.maze;
            cellSize = data.cellSize;
            players = data.players;
            for (const id in renderPosition) delete renderPosition[id];
            for (const id in players) {
                if (id === socket.id) continue;
                const p = players[id];
                renderPosition[id] = { x: p.x, y: p.y };
            }
            timerEl.innerText = formatSecondsAsMMSS(data.timer);
        });
        socket.on('playerMoved', (p) => { players[p.id] = p; });
        function formatSecondsAsMMSS(totalSeconds) {
            const sec = Math.max(0, Math.floor(Number(totalSeconds) || 0));
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }
        socket.on('timerUpdate', (t) => { timerEl.innerText = formatSecondsAsMMSS(t); });
        socket.on('playerDisconnected', (id) => {
            delete players[id];
            delete renderPosition[id];
        });
        socket.on('gameOver', (loserId) => {
            alert(loserId === socket.id ? "הפסדת! היית התופס." : "ניצחת! ברחת בזמן.");
        });

        // תנועה — WASD + חצים
        const keys = { w: false, a: false, s: false, d: false };
        function applyKey(e, down) {
            switch (e.key) {
                case 'ArrowUp':
                    keys.w = down;
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    keys.s = down;
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    keys.a = down;
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    keys.d = down;
                    e.preventDefault();
                    break;
                default: {
                    const k = e.key.toLowerCase();
                    if (k === 'w' || k === 'a' || k === 's' || k === 'd') keys[k] = down;
                    break;
                }
            }
        }
        window.onkeydown = (e) => applyKey(e, true);
        window.onkeyup = (e) => applyKey(e, false);

        const joystickBase = document.getElementById('joystickBase');
        const joystickKnob = document.getElementById('joystickKnob');
        const JOYSTICK_MAX_OFFSET = 42;
        const JOYSTICK_DEAD_PX = 6;
        const joystickInput = {
            active: false,
            pointerId: null,
            vecX: 0,
            vecY: 0
        };

        function setJoystickKnobVisual(ox, oy) {
            joystickKnob.style.transform = `translate(${ox}px, ${oy}px)`;
        }

        function updateJoystickFromClientXY(clientX, clientY) {
            const rect = joystickBase.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            let dx = clientX - cx;
            let dy = clientY - cy;
            let dist = Math.hypot(dx, dy);
            if (dist < JOYSTICK_DEAD_PX) {
                setJoystickKnobVisual(0, 0);
                joystickInput.vecX = 0;
                joystickInput.vecY = 0;
                return;
            }
            if (dist > JOYSTICK_MAX_OFFSET) {
                const s = JOYSTICK_MAX_OFFSET / dist;
                dx *= s;
                dy *= s;
                dist = JOYSTICK_MAX_OFFSET;
            }
            if (Math.abs(dx) >= Math.abs(dy)) dy = 0;
            else dx = 0;
            const ax = Math.max(Math.abs(dx), Math.abs(dy));
            if (ax < JOYSTICK_DEAD_PX) {
                setJoystickKnobVisual(0, 0);
                joystickInput.vecX = 0;
                joystickInput.vecY = 0;
                return;
            }
            setJoystickKnobVisual(dx, dy);
            const usable = JOYSTICK_MAX_OFFSET - JOYSTICK_DEAD_PX;
            const mag = Math.min(1, (ax - JOYSTICK_DEAD_PX) / usable);
            joystickInput.vecX = dx !== 0 ? Math.sign(dx) * mag : 0;
            joystickInput.vecY = dy !== 0 ? Math.sign(dy) * mag : 0;
        }

        function resetJoystick() {
            const pid = joystickInput.pointerId;
            joystickInput.active = false;
            joystickInput.pointerId = null;
            joystickInput.vecX = 0;
            joystickInput.vecY = 0;
            setJoystickKnobVisual(0, 0);
            if (pid != null) {
                try {
                    joystickBase.releasePointerCapture(pid);
                } catch (_) {}
            }
        }

        joystickBase.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (joystickInput.active) resetJoystick();
            joystickInput.active = true;
            joystickInput.pointerId = e.pointerId;
            try {
                joystickBase.setPointerCapture(e.pointerId);
            } catch (_) {}
            updateJoystickFromClientXY(e.clientX, e.clientY);
        });

        joystickBase.addEventListener('pointermove', (e) => {
            if (!joystickInput.active || e.pointerId !== joystickInput.pointerId) return;
            e.preventDefault();
            updateJoystickFromClientXY(e.clientX, e.clientY);
        });

        function onJoystickPointerEnd(e) {
            if (!joystickInput.active || e.pointerId !== joystickInput.pointerId) return;
            e.preventDefault();
            resetJoystick();
        }

        joystickBase.addEventListener('pointerup', onJoystickPointerEnd);
        joystickBase.addEventListener('pointercancel', onJoystickPointerEnd);

        if (!('PointerEvent' in window)) {
            let joyTouchId = null;
            joystickBase.addEventListener(
                'touchstart',
                (e) => {
                    e.preventDefault();
                    const t = e.changedTouches[0];
                    joyTouchId = t.identifier;
                    joystickInput.active = true;
                    joystickInput.pointerId = -1;
                    updateJoystickFromClientXY(t.clientX, t.clientY);
                },
                { passive: false }
            );
            document.addEventListener(
                'touchmove',
                (e) => {
                    if (joyTouchId == null) return;
                    e.preventDefault();
                    for (let i = 0; i < e.touches.length; i++) {
                        if (e.touches[i].identifier === joyTouchId) {
                            updateJoystickFromClientXY(e.touches[i].clientX, e.touches[i].clientY);
                            break;
                        }
                    }
                },
                { passive: false, capture: true }
            );
            const joyTouchEnd = (e) => {
                if (joyTouchId == null) return;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joyTouchId) {
                        joyTouchId = null;
                        resetJoystick();
                        break;
                    }
                }
            };
            document.addEventListener('touchend', joyTouchEnd, { passive: false, capture: true });
            document.addEventListener('touchcancel', joyTouchEnd, { passive: false, capture: true });
        }

        function tryMovePlayer(me, dx, dy) {
            const nx = me.x + dx;
            const ny = me.y + dy;
            if (playerOverlapsWall(nx, ny, PLAYER_W, PLAYER_H)) return false;
            me.x = nx;
            me.y = ny;
            return true;
        }

        const MOVE_INTENT = 0.15;

        function cardinalDirFromInput(tx, ty) {
            let dirX = 0;
            let dirY = 0;
            if (Math.abs(tx) < MOVE_INTENT && Math.abs(ty) < MOVE_INTENT) return { dirX: 0, dirY: 0 };
            if (Math.abs(tx) >= Math.abs(ty)) {
                if (tx > MOVE_INTENT) dirX = 1;
                else if (tx < -MOVE_INTENT) dirX = -1;
            } else {
                if (ty > MOVE_INTENT) dirY = 1;
                else if (ty < -MOVE_INTENT) dirY = -1;
            }
            return { dirX, dirY };
        }

        function tryMoveCardinalWithSubsteps(me, dirX, dirY, step) {
            if (dirX === 0 && dirY === 0) return;
            for (const f of [1, 0.62, 0.35]) {
                if (tryMovePlayer(me, dirX * step * f, dirY * step * f)) return;
            }
        }

        function update() {
            const me = players[socket.id];
            if (me) {
                if (maze) {
                    const now = performance.now();
                    const isDashing = now < dashUntil;
                    const step = me.isTagger ? BASE_MOVE_STEP * TAGGER_SPEED_MULT : BASE_MOVE_STEP;
                    const kx = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
                    const ky = (keys.s ? 1 : 0) - (keys.w ? 1 : 0);
                    const tx = kx + joystickInput.vecX;
                    const ty = ky + joystickInput.vecY;
                    let { dirX, dirY } = cardinalDirFromInput(tx, ty);
                    if (dirX !== 0 || dirY !== 0) {
                        lastMoveDirX = dirX;
                        lastMoveDirY = dirY;
                    } else if (isDashing && (lastMoveDirX !== 0 || lastMoveDirY !== 0)) {
                        dirX = lastMoveDirX;
                        dirY = lastMoveDirY;
                    }
                    const bursts = isDashing ? DASH_SPEED_MULT : 1;
                    for (let b = 0; b < bursts; b++) {
                        tryMoveCardinalWithSubsteps(me, dirX, dirY, step);
                    }
                }
                camera.x = me.x + PLAYER_W / 2 - canvas.width / 2;
                camera.y = me.y + PLAYER_H / 2 - canvas.height / 2;
                socket.emit('playerMovement', { x: me.x, y: me.y });
            }
            stepRenderPositionInterpolation();
            updateDashButtonVisual();
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = MAZE_BG;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            if (maze) {
                const rows = maze.length;
                const cols = maze[0].length;
                const mw = cols * cellSize;
                const mh = rows * cellSize;
                ctx.fillStyle = MAZE_BG;
                ctx.fillRect(0, 0, mw, mh);
                ctx.fillStyle = WALL_COLOR;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (maze[r][c] === 1) {
                            ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
                        }
                    }
                }
            }
            for (let id in players) {
                let p = players[id];
                const { x: rx, y: ry } = getDrawPositionForPlayer(id, p);
                ctx.fillStyle = p.isTagger ? 'red' : p.color;
                ctx.fillRect(rx, ry, PLAYER_W, PLAYER_H);
                if (p.isTagger) {
                    ctx.strokeStyle = 'white';
                    ctx.strokeRect(rx - 2, ry - 2, PLAYER_W + 4, PLAYER_H + 4);
                }
            }

            ctx.restore();
        }
        update();
    </script>
</body>
</html>
