<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מבוך תופסת</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; color: white; font-family: system-ui, sans-serif; }
        canvas {
            display: block;
            background: #333;
            touch-action: none;
        }
        #loginOverlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(12, 14, 20, 0.92);
        }
        #loginOverlay.hidden { display: none; }
        .login-panel {
            width: min(92vw, 360px);
            padding: 28px 24px;
            border-radius: 14px;
            background: #2a2d38;
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
            text-align: center;
        }
        .login-panel h2 { margin: 0 0 18px; font-size: 1.25rem; font-weight: 600; }
        .login-panel label { display: block; text-align: right; margin-bottom: 6px; font-size: 0.85rem; opacity: 0.9; }
        .login-panel input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1e2028;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 16px;
        }
        .login-panel input:focus { outline: 2px solid #5b7fd1; border-color: transparent; }
        .login-panel button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(180deg, #5b7fd1, #4568b8);
            color: #fff;
        }
        .login-panel button:hover { filter: brightness(1.06); }
        .login-panel .login-hint { margin-top: 10px; font-size: 0.75rem; opacity: 0.65; }
        #gameScreen {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        #gameScreen.game-hidden {
            visibility: hidden;
            pointer-events: none;
        }
        #ui {
            position: absolute;
            top: calc(env(safe-area-inset-top, 0px) + 2.5%);
            left: calc(env(safe-area-inset-left, 0px) + 2.5%);
            z-index: 100;
            pointer-events: none;
            max-width: min(55vw, 16rem);
            text-shadow: 0 1px 3px rgba(0,0,0,0.85);
        }
        #leaderboard {
            position: absolute;
            top: calc(env(safe-area-inset-top, 0px) + 6%);
            right: calc(env(safe-area-inset-right, 0px) + 2.5%);
            z-index: 100;
            pointer-events: none;
            max-width: min(42vw, 11rem);
            text-align: right;
            text-shadow: 0 1px 3px rgba(0,0,0,0.85);
        }
        #leaderboard .lb-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            opacity: 0.75;
            margin-bottom: 6px;
        }
        #leaderboardList { list-style: none; margin: 0; padding: 0; }
        .lb-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 0.82rem;
            line-height: 1.2;
        }
        .lb-dot {
            flex-shrink: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.25);
            box-sizing: border-box;
        }
        .lb-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 140px;
        }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-panel">
            <h2>מבוך תופסת</h2>
            <label for="playerNameInput">שם שחקן</label>
            <input type="text" id="playerNameInput" maxlength="24" placeholder="הזן שם" autocomplete="username" />
            <button type="button" id="playBtn">שחק</button>
            <p class="login-hint">נדרש שם לפני הכניסה למשחק</p>
        </div>
    </div>

    <div id="gameScreen" class="game-hidden">
        <div id="ui">
            <h1 id="timer">1:00</h1>
            <p id="status">חפש מישהו לתפוס!</p>
        </div>
        <div id="leaderboard" aria-label="שחקנים">
            <div class="lb-title">שחקנים</div>
            <ul id="leaderboardList"></ul>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('timer');
        const loginOverlay = document.getElementById('loginOverlay');
        const gameScreen = document.getElementById('gameScreen');
        const playBtn = document.getElementById('playBtn');
        const nameInput = document.getElementById('playerNameInput');
        const leaderboardList = document.getElementById('leaderboardList');

        let hasJoined = false;

        function updateLeaderboard() {
            if (!hasJoined) return;
            leaderboardList.innerHTML = '';
            const entries = Object.keys(players).map((id) => ({ id, ...players[id] }));
            entries.sort((a, b) => {
                if (!!a.isTagger !== !!b.isTagger) return a.isTagger ? -1 : 1;
                return (a.name || '').localeCompare(b.name || '', undefined, { sensitivity: 'base' });
            });
            for (const p of entries) {
                const li = document.createElement('li');
                li.className = 'lb-row';
                const dot = document.createElement('span');
                dot.className = 'lb-dot';
                dot.style.backgroundColor = p.color || '#888888';
                dot.setAttribute('aria-hidden', 'true');
                const nameEl = document.createElement('span');
                nameEl.className = 'lb-name';
                nameEl.textContent = p.name || 'Player';
                li.appendChild(dot);
                li.appendChild(nameEl);
                leaderboardList.appendChild(li);
            }
        }

        function enterGame() {
            const trimmed = nameInput.value.trim();
            if (!trimmed) {
                nameInput.focus();
                return;
            }
            socket.emit('joinGame', { name: trimmed.slice(0, 24) });
            hasJoined = true;
            loginOverlay.classList.add('hidden');
            gameScreen.classList.remove('game-hidden');
            resizeCanvas();
        }

        playBtn.addEventListener('click', () => enterGame());
        nameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                enterGame();
            }
        });
        nameInput.focus();

        const MAZE_BG = '#333';
        const WALL_COLOR = '#252525';
        const PLAYER_W = 30;
        const PLAYER_H = 30;
        const BASE_MOVE_STEP = 6;
        const TAGGER_SPEED_MULT = 1.1;
        const DASH_DURATION_MS = 200;
        const DASH_COOLDOWN_MS = 5000;
        const DASH_SPEED_MULT = 4;

        let dashUntil = 0;
        let dashCooldownUntil = 0;
        let lastMoveDirX = 0;
        let lastMoveDirY = 0;

        function tryActivateDash() {
            const now = performance.now();
            if (now < dashCooldownUntil) return;
            dashUntil = now + DASH_DURATION_MS;
            dashCooldownUntil = now + DASH_COOLDOWN_MS;
        }

        window.addEventListener('keydown', (e) => {
            if (e.code !== 'Space' && e.key !== ' ') return;
            if (e.repeat) return;
            e.preventDefault();
            tryActivateDash();
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let players = {};
        let maze = null;
        let cellSize = 52;
        const camera = { x: 0, y: 0 };
        const renderPosition = {};
        let lastInterpTime = performance.now();
        const INTERP_SMOOTH_HZ = 14;
        const INTERP_SNAP_PX = 150;
        const INTERP_SNAP_EPS = 0.2;

        function pruneRenderPosition() {
            for (const id in renderPosition) {
                if (!players[id]) delete renderPosition[id];
            }
        }

        function stepRenderPositionInterpolation() {
            const now = performance.now();
            const dt = Math.min((now - lastInterpTime) / 1000, 0.1);
            lastInterpTime = now;
            const k = 1 - Math.exp(-INTERP_SMOOTH_HZ * dt);

            for (const id in players) {
                if (id === socket.id) continue;
                const p = players[id];
                if (!p || typeof p.x !== 'number' || typeof p.y !== 'number') continue;
                let r = renderPosition[id];
                if (!r) {
                    renderPosition[id] = { x: p.x, y: p.y };
                    continue;
                }
                const dx = p.x - r.x;
                const dy = p.y - r.y;
                const dist = Math.hypot(dx, dy);
                if (dist > INTERP_SNAP_PX) {
                    r.x = p.x;
                    r.y = p.y;
                    continue;
                }
                r.x += dx * k;
                r.y += dy * k;
                if (Math.hypot(p.x - r.x, p.y - r.y) < INTERP_SNAP_EPS) {
                    r.x = p.x;
                    r.y = p.y;
                }
            }
        }

        function getDrawPositionForPlayer(id, p) {
            if (id === socket.id) return { x: p.x, y: p.y };
            const r = renderPosition[id];
            return r ? { x: r.x, y: r.y } : { x: p.x, y: p.y };
        }

        socket.on('mazeData', (data) => {
            maze = data.maze;
            cellSize = data.cellSize;
            for (const id in renderPosition) delete renderPosition[id];
        });

        function playerOverlapsWall(x, y, w, h) {
            if (!maze || !maze.length || !maze[0].length) return false;
            const rows = maze.length;
            const cols = maze[0].length;
            const c0 = Math.floor(x / cellSize);
            const c1 = Math.floor((x + w - 1) / cellSize);
            const r0 = Math.floor(y / cellSize);
            const r1 = Math.floor((y + h - 1) / cellSize);
            for (let r = r0; r <= r1; r++) {
                for (let c = c0; c <= c1; c++) {
                    if (r < 0 || r >= rows || c < 0 || c >= cols || maze[r][c] === 1) {
                        return true;
                    }
                }
            }
            return false;
        }
        socket.on('positionCorrection', (pos) => {
            if (!hasJoined || !players[socket.id]) return;
            players[socket.id].x = pos.x;
            players[socket.id].y = pos.y;
        });
        socket.on('currentPlayers', (serverPlayers) => {
            if (!hasJoined) return;
            players = serverPlayers;
            pruneRenderPosition();
            for (const id in players) {
                if (id === socket.id) continue;
                const p = players[id];
                if (!renderPosition[id]) renderPosition[id] = { x: p.x, y: p.y };
            }
            updateLeaderboard();
        });
        socket.on('tagEvent', (data) => {
            if (!hasJoined || data == null || typeof data !== 'object') return;
            const oldTagger = data.oldTagger;
            const newTagger = data.newTagger;
            const immuneUntil = data.immuneUntil;
            if (typeof oldTagger !== 'string' || typeof newTagger !== 'string') return;
            if (players[oldTagger]) {
                players[oldTagger].isTagger = false;
                if (typeof immuneUntil === 'number' && Number.isFinite(immuneUntil)) {
                    players[oldTagger].immuneUntil = immuneUntil;
                }
            }
            if (players[newTagger]) {
                players[newTagger].isTagger = true;
                players[newTagger].immuneUntil = 0;
            }
            updateLeaderboard();
        });
        socket.on('gameReset', (data) => {
            if (!hasJoined) return;
            maze = data.maze;
            cellSize = data.cellSize;
            players = data.players;
            for (const id in renderPosition) delete renderPosition[id];
            for (const id in players) {
                if (id === socket.id) continue;
                const p = players[id];
                renderPosition[id] = { x: p.x, y: p.y };
            }
            timerEl.innerText = formatSecondsAsMMSS(data.timer);
            updateLeaderboard();
        });
        socket.on('playerMoved', (p) => {
            if (!hasJoined) return;
            const prev = players[p.id] || {};
            players[p.id] = { ...prev, ...p };
        });
        function formatSecondsAsMMSS(totalSeconds) {
            const sec = Math.max(0, Math.floor(Number(totalSeconds) || 0));
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }
        socket.on('timerUpdate', (t) => { timerEl.innerText = formatSecondsAsMMSS(t); });
        socket.on('playerDisconnected', (id) => {
            if (!hasJoined) return;
            delete players[id];
            delete renderPosition[id];
            updateLeaderboard();
        });
        socket.on('gameOver', (loserId) => {
            if (!hasJoined) return;
            alert(loserId === socket.id ? "הפסדת! היית התופס." : "ניצחת! ברחת בזמן.");
        });

        // תנועה — WASD + חצים
        const keys = { w: false, a: false, s: false, d: false };
        function applyKey(e, down) {
            switch (e.key) {
                case 'ArrowUp':
                    keys.w = down;
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    keys.s = down;
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    keys.a = down;
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    keys.d = down;
                    e.preventDefault();
                    break;
                default: {
                    const k = e.key.toLowerCase();
                    if (k === 'w' || k === 'a' || k === 's' || k === 'd') keys[k] = down;
                    break;
                }
            }
        }
        window.onkeydown = (e) => applyKey(e, true);
        window.onkeyup = (e) => applyKey(e, false);

        const touchMoveInput = { vecX: 0, vecY: 0 };
        const floatJoy = {
            active: false,
            touchId: null,
            centerX: 0,
            centerY: 0,
            knobDx: 0,
            knobDy: 0,
            baseRadius: 66,
            maxKnobOffset: 46,
            deadPx: 10
        };

        const joyDocOpts = { passive: false, capture: true };

        function screenHalfX() {
            return canvas.width * 0.5;
        }

        function detachFloatJoyDocumentListeners() {
            document.removeEventListener('touchmove', onFloatJoyDocMove, joyDocOpts);
            document.removeEventListener('touchend', onFloatJoyDocEnd, joyDocOpts);
            document.removeEventListener('touchcancel', onFloatJoyDocEnd, joyDocOpts);
        }

        function resetFloatJoystick() {
            floatJoy.active = false;
            floatJoy.touchId = null;
            floatJoy.knobDx = 0;
            floatJoy.knobDy = 0;
            touchMoveInput.vecX = 0;
            touchMoveInput.vecY = 0;
            detachFloatJoyDocumentListeners();
        }

        function updateFloatJoystickKnob(clientX, clientY) {
            let dx = clientX - floatJoy.centerX;
            let dy = clientY - floatJoy.centerY;
            let dist = Math.hypot(dx, dy);
            if (dist < floatJoy.deadPx) {
                floatJoy.knobDx = 0;
                floatJoy.knobDy = 0;
                touchMoveInput.vecX = 0;
                touchMoveInput.vecY = 0;
                return;
            }
            if (dist > floatJoy.maxKnobOffset) {
                const s = floatJoy.maxKnobOffset / dist;
                dx *= s;
                dy *= s;
                dist = floatJoy.maxKnobOffset;
            }
            if (Math.abs(dx) >= Math.abs(dy)) dy = 0;
            else dx = 0;
            const ax = Math.max(Math.abs(dx), Math.abs(dy));
            if (ax < floatJoy.deadPx) {
                floatJoy.knobDx = 0;
                floatJoy.knobDy = 0;
                touchMoveInput.vecX = 0;
                touchMoveInput.vecY = 0;
                return;
            }
            floatJoy.knobDx = dx;
            floatJoy.knobDy = dy;
            const usable = floatJoy.maxKnobOffset - floatJoy.deadPx;
            const mag = Math.min(1, (ax - floatJoy.deadPx) / usable);
            touchMoveInput.vecX = dx !== 0 ? Math.sign(dx) * mag : 0;
            touchMoveInput.vecY = dy !== 0 ? Math.sign(dy) * mag : 0;
        }

        function onFloatJoyDocMove(e) {
            if (!floatJoy.active) return;
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const t = e.touches[i];
                if (t.identifier === floatJoy.touchId) {
                    updateFloatJoystickKnob(t.clientX, t.clientY);
                    return;
                }
            }
        }

        function onFloatJoyDocEnd(e) {
            if (!floatJoy.active) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === floatJoy.touchId) {
                    e.preventDefault();
                    resetFloatJoystick();
                    return;
                }
            }
        }

        function startFloatJoystick(t) {
            if (floatJoy.active) return;
            floatJoy.active = true;
            floatJoy.touchId = t.identifier;
            floatJoy.centerX = t.clientX;
            floatJoy.centerY = t.clientY;
            document.addEventListener('touchmove', onFloatJoyDocMove, joyDocOpts);
            document.addEventListener('touchend', onFloatJoyDocEnd, joyDocOpts);
            document.addEventListener('touchcancel', onFloatJoyDocEnd, joyDocOpts);
            updateFloatJoystickKnob(t.clientX, t.clientY);
        }

        function handleCanvasTouchStart(e) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.clientX >= screenHalfX()) {
                    e.preventDefault();
                    tryActivateDash();
                } else if (!floatJoy.active) {
                    e.preventDefault();
                    startFloatJoystick(t);
                }
            }
        }

        canvas.addEventListener('touchstart', handleCanvasTouchStart, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            if (e.clientX >= screenHalfX()) tryActivateDash();
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            resetFloatJoystick();
        });

        function tryMovePlayer(me, dx, dy) {
            const nx = me.x + dx;
            const ny = me.y + dy;
            if (playerOverlapsWall(nx, ny, PLAYER_W, PLAYER_H)) return false;
            me.x = nx;
            me.y = ny;
            return true;
        }

        const MOVE_INTENT = 0.15;

        function cardinalDirFromInput(tx, ty) {
            let dirX = 0;
            let dirY = 0;
            if (Math.abs(tx) < MOVE_INTENT && Math.abs(ty) < MOVE_INTENT) return { dirX: 0, dirY: 0 };
            if (Math.abs(tx) >= Math.abs(ty)) {
                if (tx > MOVE_INTENT) dirX = 1;
                else if (tx < -MOVE_INTENT) dirX = -1;
            } else {
                if (ty > MOVE_INTENT) dirY = 1;
                else if (ty < -MOVE_INTENT) dirY = -1;
            }
            return { dirX, dirY };
        }

        function tryMoveCardinalWithSubsteps(me, dirX, dirY, step) {
            if (dirX === 0 && dirY === 0) return;
            for (const f of [1, 0.62, 0.35]) {
                if (tryMovePlayer(me, dirX * step * f, dirY * step * f)) return;
            }
        }

        function update() {
            try {
                if (canvas.width < 2 || canvas.height < 2) resizeCanvas();
                const me = players[socket.id];
                if (me && typeof me.x === 'number' && typeof me.y === 'number') {
                    if (maze) {
                        const now = performance.now();
                        const isDashing = now < dashUntil;
                        const step = me.isTagger ? BASE_MOVE_STEP * TAGGER_SPEED_MULT : BASE_MOVE_STEP;
                        const kx = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
                        const ky = (keys.s ? 1 : 0) - (keys.w ? 1 : 0);
                        const tx = kx + touchMoveInput.vecX;
                        const ty = ky + touchMoveInput.vecY;
                        let { dirX, dirY } = cardinalDirFromInput(tx, ty);
                        if (dirX !== 0 || dirY !== 0) {
                            lastMoveDirX = dirX;
                            lastMoveDirY = dirY;
                        } else if (isDashing && (lastMoveDirX !== 0 || lastMoveDirY !== 0)) {
                            dirX = lastMoveDirX;
                            dirY = lastMoveDirY;
                        }
                        const bursts = isDashing ? DASH_SPEED_MULT : 1;
                        for (let b = 0; b < bursts; b++) {
                            tryMoveCardinalWithSubsteps(me, dirX, dirY, step);
                        }
                    }
                    camera.x = me.x + PLAYER_W / 2 - canvas.width / 2;
                    camera.y = me.y + PLAYER_H / 2 - canvas.height / 2;
                    if (socket && socket.connected) {
                        socket.emit('playerMovement', { x: me.x, y: me.y });
                    }
                }
                stepRenderPositionInterpolation();
                draw();
            } catch (err) {
                console.error(err);
                try {
                    ctx.fillStyle = MAZE_BG;
                    ctx.fillRect(0, 0, canvas.width || 300, canvas.height || 150);
                } catch (_) {}
            }
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = MAZE_BG;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            if (maze && maze.length > 0 && maze[0] && maze[0].length > 0) {
                const rows = maze.length;
                const cols = maze[0].length;
                const mw = cols * cellSize;
                const mh = rows * cellSize;
                ctx.fillStyle = MAZE_BG;
                ctx.fillRect(0, 0, mw, mh);
                ctx.fillStyle = WALL_COLOR;
                for (let r = 0; r < rows; r++) {
                    const row = maze[r];
                    if (!row || row.length < cols) continue;
                    for (let c = 0; c < cols; c++) {
                        if (row[c] === 1) {
                            ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
                        }
                    }
                }
            }
            for (let id in players) {
                let p = players[id];
                if (!p || typeof p.x !== 'number' || typeof p.y !== 'number') continue;
                const { x: rx, y: ry } = getDrawPositionForPlayer(id, p);
                const immuneUntilTs = p.immuneUntil ?? 0;
                const isImmune = Date.now() < immuneUntilTs;
                ctx.save();
                if (isImmune) {
                    ctx.globalAlpha = Math.floor(Date.now() / 200) % 2 === 0 ? 0.35 : 0.9;
                }
                ctx.fillStyle = p.isTagger ? 'red' : p.color;
                ctx.fillRect(rx, ry, PLAYER_W, PLAYER_H);
                if (p.isTagger) {
                    ctx.strokeStyle = 'white';
                    ctx.strokeRect(rx - 2, ry - 2, PLAYER_W + 4, PLAYER_H + 4);
                }
                ctx.restore();
            }

            ctx.restore();

            drawFloatingJoystickHud();
        }

        function drawFloatingJoystickHud() {
            ctx.save();
            try {
                if (floatJoy.active) {
                    const cx = floatJoy.centerX;
                    const cy = floatJoy.centerY;
                    const br = floatJoy.baseRadius;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.14)';
                    ctx.beginPath();
                    ctx.arc(cx, cy, br, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.07)';
                    ctx.beginPath();
                    ctx.arc(cx, cy, floatJoy.deadPx, 0, Math.PI * 2);
                    ctx.fill();
                    const kx = cx + floatJoy.knobDx;
                    const ky = cy + floatJoy.knobDy;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.38)';
                    ctx.beginPath();
                    ctx.arc(kx, ky, 26, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                const now = performance.now();
                if (now < dashCooldownUntil) {
                    const sec = Math.max(1, Math.ceil((dashCooldownUntil - now) / 1000));
                    ctx.font = 'bold 17px system-ui, -apple-system, sans-serif';
                    ctx.fillStyle = 'rgba(200, 210, 230, 0.92)';
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'top';
                    ctx.fillText(`Dash · ${sec}s`, canvas.width - 14, 12);
                }
            } finally {
                ctx.restore();
            }
        }

        update();
    </script>
</body>
</html>
